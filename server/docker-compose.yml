services:
  postgres:
    image: postgres:16-alpine
    container_name: transitops_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: transitops_platform_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${POSTGRES_HOST_PORT:-15432}:5432"
    volumes:
      - transitops_postgres_data:/var/lib/postgresql/data

volumes:
  transitops_postgres_data:
