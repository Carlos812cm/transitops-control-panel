<div class="empty-state">
  <div class="empty-icon">—</div>

  <h3>{{ title }}</h3>
  <p>{{ message }}</p>

  @if (actionLabel && actionLink) {
    @if (actionRoles.length > 0) {
      <a *appHasRole="actionRoles" class="btn btn-outline-primary btn-sm" [routerLink]="actionLink">
        {{ actionLabel }}
      </a>
    } @else {
      <a class="btn btn-outline-primary btn-sm" [routerLink]="actionLink">
        {{ actionLabel }}
      </a>
    }
  }
</div>
