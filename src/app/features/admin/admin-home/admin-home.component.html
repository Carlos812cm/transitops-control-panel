<app-page-header [title]="t('admin.title')" [subtitle]="t('admin.subtitle')" />

<div class="card border-0 shadow-sm">
  <div class="card-body p-4">
    <h2 class="h5 fw-bold mb-2">{{ t('admin.panel.title') }}</h2>
    <p class="text-muted mb-4">
      {{ t('admin.panel.description') }}
    </p>

    <div class="admin-actions">
      <a class="btn btn-primary" routerLink="/vehicles/new">{{ t('vehicles.create') }}</a>
      <a class="btn btn-outline-primary" routerLink="/drivers/new">{{ t('drivers.create') }}</a>
      <a class="btn btn-outline-primary" routerLink="/routes/new">{{ t('routes.create') }}</a>
    </div>
  </div>
</div>
