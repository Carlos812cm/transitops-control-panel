<header class="navbar-panel">
  <div class="navbar-main">
    <button
      type="button"
      class="mobile-sidebar-toggle"
      [attr.aria-label]="t('navbar.openSidebar')"
      [class.hidden]="isSidebarOpen"
      (click)="openMenu()"
    >
      <span aria-hidden="true">&#9776;</span>
    </button>

    <div class="navbar-title-block">
      <span class="navbar-eyebrow">TransitOps Platform</span>
      <h2>{{ t('navbar.title') }}</h2>
      <p>{{ t('navbar.subtitle') }}</p>
    </div>
  </div>

  @if (currentUser(); as user) {
    <div class="navbar-user" (click)="keepProfileMenuOpen($event)">
      <button
        type="button"
        class="profile-trigger"
        [class.open]="isProfileMenuOpen()"
        [attr.aria-expanded]="isProfileMenuOpen()"
        aria-haspopup="menu"
        (click)="toggleProfileMenu($event)"
      >
        <span class="user-avatar" aria-hidden="true">
          @if (getAvatarUrl(user); as avatarUrl) {
            <img [src]="avatarUrl" [alt]="getDisplayName(user)" />
          } @else {
            {{ getInitials(user) }}
          }
        </span>

        <span class="user-copy">
          <span class="user-name">{{ getDisplayName(user) }}</span>
          <span class="user-role">{{ user.role }}</span>
        </span>

        <span class="profile-chevron" aria-hidden="true">⌄</span>
      </button>

      @if (isProfileMenuOpen()) {
        <div class="profile-menu" role="menu">
          <button type="button" role="menuitem" class="profile-menu-item" (click)="goToProfile()">
            <span class="profile-menu-icon" aria-hidden="true">👤</span>
            <span>
              <strong>{{ t('navbar.profile') }}</strong>
              <small>{{ t('navbar.profile.description') }}</small>
            </span>
          </button>

          <button type="button" role="menuitem" class="profile-menu-item" (click)="goToSettings()">
            <span class="profile-menu-icon" aria-hidden="true">⚙</span>
            <span>
              <strong>{{ t('navbar.settings') }}</strong>
              <small>{{ t('navbar.settings.description') }}</small>
            </span>
          </button>

          <span class="profile-menu-divider" aria-hidden="true"></span>

          <button type="button" role="menuitem" class="profile-menu-item danger" (click)="logout()">
            <span class="profile-menu-icon" aria-hidden="true">↪</span>
            <span>
              <strong>{{ t('navbar.logout') }}</strong>
              <small>{{ t('navbar.logout.description') }}</small>
            </span>
          </button>
        </div>
      }
    </div>
  }
</header>
